name: GainZone CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Test & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend Tests
        working-directory: ./backend
        run: mvn test

      - name: Package Backend
        working-directory: ./backend
        run: mvn package -DskipTests

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: gainzone-front/package-lock.json

      - name: Install Dependencies
        working-directory: ./gainzone-front
        run: npm install

      - name: Build Frontend
        working-directory: ./gainzone-front
        run: npm run build
