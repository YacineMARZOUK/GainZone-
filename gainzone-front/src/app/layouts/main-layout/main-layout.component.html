<div class="flex h-screen bg-dark-bg text-white overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-black flex flex-col border-r border-zinc-900 shadow-2xl z-20">
    <div class="h-20 flex items-center justify-center border-b border-zinc-900">
      <!-- You can put a logo icon here if you want -->
      <h2 class="text-3xl font-black text-white tracking-widest"><span class="text-volt">G</span>Z.</h2>
    </div>

    <nav class="flex-1 py-8 px-4 space-y-2 overflow-y-auto">
      <a 
        *ngFor="let item of menuItems" 
        [routerLink]="item.path"
        routerLinkActive="bg-zinc-900 !text-volt border-l-4 border-volt"
        [routerLinkActiveOptions]="{exact: false}"
        class="flex items-center gap-4 px-4 py-3 text-dim-gray font-medium rounded-lg hover:text-volt hover:bg-zinc-900/50 transition-all border-l-4 border-transparent"
      >
        <lucide-icon [img]="item.icon" class="w-5 h-5"></lucide-icon>
        {{ item.label }}
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Navbar -->
    <header class="h-20 bg-dark-bg/80 backdrop-blur border-b border-zinc-900 flex items-center justify-between px-8 z-10 sticky top-0">
      
      <!-- Left side (Greeting/Logo) -->
      <div class="flex items-center gap-4">
        <h1 class="text-xl font-black tracking-wider text-white">
          <span class="text-volt">GAIN</span>ZONE
        </h1>
        <span class="px-3 py-1 bg-zinc-900 text-dim-gray text-xs rounded-full font-bold uppercase tracking-wider border border-zinc-800 ml-4 hidden md:block">
          {{ role }}
        </span>
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-6">

        <button 
          (click)="logout()"
          class="flex items-center gap-2 text-dim-gray hover:text-red-500 font-medium transition-colors px-4 py-2 rounded-lg hover:bg-red-500/10"
        >
          <lucide-icon [img]="icons.LogOut" class="w-5 h-5"></lucide-icon>
          <span class="hidden md:inline">Déconnexion</span>
        </button>
      </div>
    </header>

    <!-- Page Content (Dashboard, etc.) -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
