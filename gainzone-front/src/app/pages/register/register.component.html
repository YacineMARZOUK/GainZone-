<div class="min-h-screen flex items-center justify-center bg-dark-bg p-4 py-12">
  <div class="w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-volt tracking-wider">GAINZONE</h1>
      <p class="text-dim-gray mt-2">Créez votre compte pour commencer</p>
    </div>

    <div *ngIf="success" class="bg-green-900/30 border border-green-900 text-green-400 px-4 py-4 rounded-xl text-center mb-6">
      Inscription réussie ! Redirection vers la connexion...
    </div>

    <form *ngIf="!success" [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <!-- Split Name / LastName -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-stone-300 mb-1">Prénom</label>
          <input 
            type="text" 
            formControlName="name" 
            placeholder="John"
            class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-300 mb-1">Nom</label>
          <input 
            type="text" 
            formControlName="lastName" 
            placeholder="Doe"
            class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
          />
        </div>
      </div>

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Nom d'utilisateur *</label>
        <input 
          type="text" 
          formControlName="username" 
          placeholder="johndoe123"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
        <div *ngIf="registerForm.get('username')?.invalid && (registerForm.get('username')?.dirty || registerForm.get('username')?.touched)" class="text-xs text-red-500 mt-1">
          <span *ngIf="registerForm.get('username')?.errors?.['required']">Requis.</span>
          <span *ngIf="registerForm.get('username')?.errors?.['minlength']">Min 3 caractères.</span>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Email *</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="votre@email.com"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
        <div *ngIf="registerForm.get('email')?.invalid && (registerForm.get('email')?.dirty || registerForm.get('email')?.touched)" class="text-xs text-red-500 mt-1">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">Requis.</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Format email invalide.</span>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Mot de passe *</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
        <div *ngIf="registerForm.get('password')?.invalid && (registerForm.get('password')?.dirty || registerForm.get('password')?.touched)" class="text-xs text-red-500 mt-1">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">Requis.</span>
          <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Min 6 caractères.</span>
        </div>
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Téléphone</label>
        <input 
          type="text" 
          formControlName="phone" 
          placeholder="+33 6 12 34 56 78"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
      </div>

      <!-- Role Selector (Styled Radios) -->
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-2">Je suis un *</label>
        <div class="grid grid-cols-2 gap-4">
          <label class="relative cursor-pointer">
            <input type="radio" formControlName="role" value="MEMBER" class="peer sr-only" />
            <div class="w-full p-4 bg-stone-800 border border-stone-700/50 rounded-xl text-center text-stone-400 hover:bg-stone-700 transition-all peer-checked:border-volt peer-checked:text-volt peer-checked:bg-volt/10">
              <span class="block font-bold">Membre</span>
            </div>
          </label>
          <label class="relative cursor-pointer">
            <input type="radio" formControlName="role" value="COACH" class="peer sr-only" />
            <div class="w-full p-4 bg-stone-800 border border-stone-700/50 rounded-xl text-center text-stone-400 hover:bg-stone-700 transition-all peer-checked:border-volt peer-checked:text-volt peer-checked:bg-volt/10">
              <span class="block font-bold">Coach</span>
            </div>
          </label>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="registerForm.invalid || isLoading"
        class="w-full py-3 bg-volt text-black font-bold rounded-xl hover:bg-lime-400 focus:ring-4 focus:ring-lime-700/50 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none mt-6 shadow-lg shadow-volt/20"
      >
        <span *ngIf="!isLoading">Créer mon compte</span>
        <span *ngIf="isLoading">Création...</span>
      </button>

      <!-- Error message -->
      <div *ngIf="error" class="bg-red-900/30 border border-red-900 text-red-400 px-4 py-3 rounded-xl text-sm text-center">
        {{ error }}
      </div>

      <div class="text-center mt-6">
        <a routerLink="/login" class="text-sm text-dim-gray hover:text-volt transition-colors">Déjà un compte ? Se connecter</a>
      </div>
    </form>
  </div>
</div>
