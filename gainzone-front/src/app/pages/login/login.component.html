<div class="min-h-screen flex items-center justify-center bg-dark-bg p-4">
  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-volt tracking-wider">GAINZONE</h1>
      <p class="text-dim-gray mt-2">Connectez-vous à votre espace manager</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Email</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="votre@email.com"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
        <div *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)" class="text-xs text-red-500 mt-1">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">L'email est requis.</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Format email invalide.</span>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-300 mb-1">Mot de passe</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-stone-800 border border-stone-700/50 rounded-xl text-white placeholder-stone-500 focus:outline-none focus:border-volt focus:ring-1 focus:ring-volt transition-all"
        />
        <div *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)" class="text-xs text-red-500 mt-1">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Le mot de passe est requis.</span>
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-stone-400">
          <input type="checkbox" class="accent-volt mr-2 rounded"> Se souvenir de moi
        </label>
        <a href="#" class="text-volt hover:underline">Mot de passe oublié ?</a>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading"
        class="w-full py-3 bg-volt text-black font-bold rounded-xl hover:bg-lime-400 focus:ring-4 focus:ring-lime-700/50 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none mt-4 shadow-lg shadow-volt/20"
      >
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Chargement...</span>
      </button>

      <div *ngIf="error" class="bg-red-900/30 border border-red-900 text-red-400 px-4 py-3 rounded-xl text-sm text-center">
        {{ error }}
      </div>
      
      <div class="text-center mt-6">
        <p class="text-sm text-dim-gray">Pas encore de compte ? 
          <a routerLink="/register" class="text-volt hover:underline transition-colors font-medium">S'inscrire</a>
        </p>
      </div>
    </form>
  </div>
</div>
